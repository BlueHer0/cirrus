# Cirrus — Nginx config for cirrus.nubex.me
# Deploy:
#   sudo ln -sf /var/www/cirrus/nginx/cirrus.conf /etc/nginx/sites-enabled/cirrus.conf
#   sudo nginx -t && sudo nginx -s reload
#   sudo certbot --nginx -d cirrus.nubex.me

upstream cirrus_backend {
    server 127.0.0.1:8200;
}

server {
    server_name cirrus.nubex.me;

    # ── Static files (served by Nginx, not Gunicorn) ─────────────────
    location /static/ {
        alias /var/www/cirrus/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Favicon ──────────────────────────────────────────────────────
    location = /favicon.ico {
        alias /var/www/cirrus/staticfiles/img/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # ── API & App (proxy to Gunicorn) ────────────────────────────────
    location / {
        proxy_pass http://cirrus_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeouts for scraping operations via API
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Upload limits (for FIEL .cer/.key uploads) ───────────────────
    client_max_body_size 10M;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/cirrus.nubex.me/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cirrus.nubex.me/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = cirrus.nubex.me) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name cirrus.nubex.me;
    return 404; # managed by Certbot


}