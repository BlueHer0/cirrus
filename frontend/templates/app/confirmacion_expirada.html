{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlace Expirado — Cirrus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0c0e14; background-image: radial-gradient(ellipse 80% 50% at 50% 20%, rgba(99,102,241,0.12), transparent); min-height: 100vh; }
    </style>
</head>
<body class="text-gray-300 antialiased flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full mx-4 text-center">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center mx-auto mb-6">
            <span class="text-3xl">⏰</span>
        </div>
        <h1 class="text-2xl font-bold text-white mb-2">Enlace expirado</h1>
        <p class="text-gray-400 mb-6">
            Este enlace de confirmación ha expirado.<br>
            Solicita uno nuevo ingresando tu email.
        </p>

        {% if messages %}
        <div class="mb-4 space-y-2">
            {% for msg in messages %}
            <div class="px-4 py-2.5 rounded-lg text-sm {% if msg.tags == 'error' %}bg-red-500/10 text-red-400 border border-red-500/20{% else %}bg-green-500/10 text-green-400 border border-green-500/20{% endif %}">{{ msg }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <div class="bg-white/5 border border-white/10 rounded-xl p-5 mb-6">
            <form method="post" action="{% url 'app:reenviar' %}" class="space-y-3">
                {% csrf_token %}
                <input type="email" name="email" required placeholder="tu@email.com"
                    class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500/50 text-sm">
                <button type="submit" class="w-full py-3 rounded-xl text-white font-medium text-sm" style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">
                    Reenviar confirmación
                </button>
            </form>
        </div>

        <a href="{% url 'app:login' %}" class="text-sm text-indigo-400 hover:text-indigo-300">← Volver al login</a>
        <p class="text-center text-xs text-gray-600 mt-6">© {{ year }} Cirrus by Nubex</p>
    </div>
</body>
</html>
