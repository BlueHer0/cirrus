{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Exitoso — Cirrus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0c0e14; background-image: radial-gradient(ellipse 80% 50% at 50% 20%, rgba(99,102,241,0.12), transparent); min-height: 100vh; }
    </style>
</head>
<body class="text-gray-300 antialiased flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full mx-4 text-center">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center mx-auto mb-6">
            <span class="text-3xl">✉️</span>
        </div>
        <h1 class="text-2xl font-bold text-white mb-2">¡Revisa tu correo!</h1>
        <p class="text-gray-400 mb-6">
            Enviamos un enlace de confirmación a<br>
            <strong class="text-white">{{ email }}</strong>
        </p>
        <div class="bg-white/5 border border-white/10 rounded-xl p-5 mb-6 text-sm text-gray-400">
            <p class="mb-2">📬 Haz click en el enlace del email para activar tu cuenta.</p>
            <p>Si no lo ves, revisa tu carpeta de spam o correo no deseado.</p>
        </div>
        <div class="flex flex-col gap-3">
            <a href="{% url 'app:login' %}" class="w-full py-3 rounded-xl text-center text-white font-medium" style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">
                Ir al Login
            </a>
            <form method="post" action="{% url 'app:reenviar' %}">
                {% csrf_token %}
                <input type="hidden" name="email" value="{{ email }}">
                <button type="submit" class="w-full py-3 rounded-xl text-sm text-gray-400 border border-white/10 hover:bg-white/5 transition">
                    Reenviar email de confirmación
                </button>
            </form>
        </div>
    </div>
</body>
</html>
