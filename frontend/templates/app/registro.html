<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro — Cirrus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0c0e14;
            background-image:
                radial-gradient(ellipse 80% 50% at 20% 40%, rgba(99,102,241,0.08), transparent),
                radial-gradient(ellipse 60% 40% at 80% 20%, rgba(139,92,246,0.06), transparent);
            min-height: 100vh;
        }
        .glass {
            background: rgba(15, 17, 26, 0.75);
            backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); transition: all 0.2s; }
        .btn-primary:hover { background: linear-gradient(135deg, #818cf8, #a78bfa); box-shadow: 0 4px 15px rgba(99,102,241,0.3); }
    </style>
</head>
<body class="text-gray-300 antialiased flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center mx-auto shadow-lg shadow-indigo-500/20 mb-4">
                <span class="text-white text-2xl font-bold">☁</span>
            </div>
            <h1 class="text-white text-2xl font-bold">Crear Cuenta en Cirrus</h1>
            <p class="text-gray-500 text-sm mt-1">Gestiona tus CFDIs del SAT — Gratis</p>
        </div>

        {% if messages %}
        <div class="mb-4 space-y-2">
            {% for msg in messages %}
            <div class="px-4 py-2.5 rounded-lg text-sm bg-red-500/10 text-red-400 border border-red-500/20">{{ msg }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <div class="glass rounded-2xl p-6">
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Email *</label>
                    <input type="email" name="email" required autofocus placeholder="tu@email.com"
                        value="{{ form.email|default:'' }}"
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500/50 text-sm">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Contraseña *</label>
                        <input type="password" name="password" required placeholder="Mín. 6 caracteres"
                            class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500/50 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Confirmar *</label>
                        <input type="password" name="password2" required placeholder="Repetir"
                            class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500/50 text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Nombre completo *</label>
                    <input type="text" name="nombre" required placeholder="Juan Pérez"
                        value="{{ form.nombre|default:'' }}"
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500/50 text-sm">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Empresa / Negocio</label>
                        <input type="text" name="empresa" placeholder="Mi Empresa"
                            value="{{ form.empresa|default:'' }}"
                            class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500/50 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Teléfono</label>
                        <input type="tel" name="telefono" placeholder="8112345678"
                            value="{{ form.telefono|default:'' }}"
                            class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500/50 text-sm">
                    </div>
                </div>
                <button type="submit" class="btn-primary w-full py-3 rounded-xl text-white font-medium text-sm">Crear Cuenta Gratis</button>
            </form>
        </div>

        <p class="text-center text-sm text-gray-500 mt-6">
            ¿Ya tienes cuenta? <a href="{% url 'app:login' %}" class="text-indigo-400 hover:text-indigo-300">Inicia sesión</a>
        </p>
        <p class="text-center text-xs text-gray-600 mt-4">© {{ year }} Cirrus by Nubex</p>
    </div>
</body>
</html>
