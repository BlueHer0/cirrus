<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Cirrus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0c0e14;
            background-image:
                radial-gradient(ellipse 80% 50% at 50% 30%, rgba(99,102,241,0.12), transparent),
                radial-gradient(ellipse 60% 40% at 30% 70%, rgba(139,92,246,0.08), transparent);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .glass-login {
            background: rgba(15, 17, 26, 0.80);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
    </style>
</head>
<body class="text-gray-300 antialiased">
    <div class="glass-login rounded-2xl p-8 w-full max-w-sm shadow-2xl shadow-black/30">
        <!-- Logo -->
        <div class="flex items-center justify-center gap-3 mb-8">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <span class="text-white text-2xl">☁</span>
            </div>
            <div>
                <h1 class="text-white font-bold text-2xl tracking-tight">CIRRUS</h1>
                <span class="text-xs text-gray-500 uppercase tracking-widest">CFDI Platform</span>
            </div>
        </div>

        {% if form.errors %}
        <div class="mb-4 px-4 py-3 rounded-lg text-sm" style="background: rgba(239,68,68,0.15); color: #f87171;">
            Credenciales incorrectas. Intenta de nuevo.
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1.5">Usuario</label>
                <input type="text" name="username" autofocus required
                    class="w-full px-4 py-2.5 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/30 text-sm"
                    placeholder="admin">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1.5">Contraseña</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-2.5 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/30 text-sm"
                    placeholder="••••••••">
            </div>
            <button type="submit"
                class="w-full py-2.5 rounded-lg text-sm text-white font-semibold"
                style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">
                Iniciar Sesión
            </button>
        </form>

        <p class="text-center text-xs text-gray-600 mt-6">&copy; {{ year }} Cirrus — Nubex</p>
    </div>
</body>
</html>
