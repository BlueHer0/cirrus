# Cirrus — Docker Compose (optional, Host-First is primary deploy)
# Use only if containerizing the app.

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cirrus_web
    env_file: ../.env
    ports:
      - "8200:8200"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - celery-worker
    restart: unless-stopped

  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cirrus_celery_worker
    env_file: ../.env
    command: celery -A cirrus worker -l info --concurrency=1 -Q scraping
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cirrus_celery_beat
    env_file: ../.env
    command: celery -A cirrus beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
